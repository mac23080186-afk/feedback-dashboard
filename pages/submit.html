<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Feedback</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50 text-gray-900">

  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4 flex items-center h-14">
      <span class="font-semibold text-lg mr-8">Feedback Dashboard</span>
      <a href="submit.html" class="mr-6 text-sm font-medium text-blue-600 border-b-2 border-blue-600 pb-0.5">Submit</a>
      <a href="admin.html" class="text-sm font-medium text-gray-500 hover:text-gray-800">Admin</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-lg mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold mb-6">Submit Feedback</h1>

    <!-- Success banner -->
    <div id="successBanner" class="hidden mb-6 rounded-md bg-green-50 border border-green-200 px-4 py-3 text-green-800 text-sm font-medium">
      Thanks for your feedback
    </div>

    <form id="feedbackForm" novalidate class="space-y-5">

      <!-- Name (optional) -->
      <div>
        <label for="name" class="block text-sm font-medium mb-1">
          Name <span class="text-gray-400 font-normal">(optional)</span>
        </label>
        <input
          id="name"
          type="text"
          placeholder="Your name"
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <!-- Location -->
      <div>
        <label for="location" class="block text-sm font-medium mb-1">Location</label>
        <select
          id="location"
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
        >
          <option value="">— Select a district —</option>
          <option value="District 1">District 1</option>
          <option value="District 3">District 3</option>
          <option value="Thao Dien">Thao Dien</option>
        </select>
      </div>

      <!-- Rating -->
      <div>
        <label class="block text-sm font-medium mb-2">
          Rating <span class="text-red-500">*</span>
        </label>
        <div id="ratingGroup" class="flex gap-2">
          <template id="starTemplate">
          </template>
        </div>
        <p id="ratingError" class="hidden mt-1 text-xs text-red-600">Please select a rating.</p>
      </div>

      <!-- Comment -->
      <div>
        <label for="comment" class="block text-sm font-medium mb-1">
          Comment <span class="text-red-500">*</span>
        </label>
        <textarea
          id="comment"
          rows="4"
          placeholder="Write your comment here..."
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
        ></textarea>
        <p id="commentError" class="hidden mt-1 text-xs text-red-600">Comment is required.</p>
      </div>

      <button
        type="submit"
        class="w-full rounded-md bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 transition-colors"
      >
        Submit
      </button>
    </form>
  </main>

  <script src="../shared/app.js"></script>
  <script>
    // Build star rating buttons
    const ratingGroup = document.getElementById("ratingGroup");
    let selectedRating = 0;

    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.dataset.value = i;
      btn.textContent = "★";
      btn.className = "text-2xl leading-none text-gray-300 hover:text-yellow-400 transition-colors focus:outline-none";
      btn.setAttribute("aria-label", `Rate ${i} out of 5`);
      btn.addEventListener("click", () => selectRating(i));
      ratingGroup.appendChild(btn);
    }

    function selectRating(value) {
      selectedRating = value;
      Array.from(ratingGroup.children).forEach((btn, idx) => {
        btn.classList.toggle("text-yellow-400", idx < value);
        btn.classList.toggle("text-gray-300", idx >= value);
      });
      document.getElementById("ratingError").classList.add("hidden");
    }

    // Form submission
    document.getElementById("feedbackForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const comment = document.getElementById("comment").value.trim();
      let valid = true;

      // Validate rating
      if (selectedRating === 0) {
        document.getElementById("ratingError").classList.remove("hidden");
        valid = false;
      }

      // Validate comment
      if (!comment) {
        document.getElementById("commentError").classList.remove("hidden");
        valid = false;
      } else {
        document.getElementById("commentError").classList.add("hidden");
      }

      if (!valid) return;

      const entry = {
        name: document.getElementById("name").value.trim() || null,
        location: document.getElementById("location").value || null,
        rating: selectedRating,
        comment,
      };

      try {
        const res = await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(entry),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(`${res.status}: ${body.error || res.statusText}`);
        }
      } catch (err) {
        alert("Failed to submit feedback.\n\nError: " + err.message);
        return;
      }

      // Reset form
      this.reset();
      selectRating(0);
      selectedRating = 0;
      Array.from(ratingGroup.children).forEach(btn => {
        btn.classList.add("text-gray-300");
        btn.classList.remove("text-yellow-400");
      });

      // Show success banner
      const banner = document.getElementById("successBanner");
      banner.classList.remove("hidden");
      setTimeout(() => banner.classList.add("hidden"), 4000);
    });

    // Hide errors on input
    document.getElementById("comment").addEventListener("input", function () {
      if (this.value.trim()) document.getElementById("commentError").classList.add("hidden");
    });
  </script>
</body>
</html>
