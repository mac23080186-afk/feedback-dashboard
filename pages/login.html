<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Feedback Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center">

  <div class="bg-white border border-gray-200 rounded-xl shadow-sm px-8 py-10 w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold mb-1">Feedback Dashboard</h1>
    <p class="text-sm text-gray-500 mb-8">Sign in with your <span class="font-medium text-gray-700">@hsb.edu.vn</span> account</p>

    <div id="errorMsg" class="hidden mb-4 rounded-md bg-red-50 border border-red-200 px-4 py-3 text-red-700 text-sm"></div>

    <button id="googleBtn"
      class="w-full flex items-center justify-center gap-3 rounded-md border border-gray-300 bg-white hover:bg-gray-50 px-4 py-2.5 text-sm font-medium text-gray-700 transition-colors shadow-sm">
      <svg class="w-5 h-5" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>

    <p id="loadingMsg" class="hidden mt-4 text-sm text-gray-400">Signing in...</p>
  </div>

  <script type="module">
    import { auth, ALLOWED_DOMAIN } from "../shared/firebase-config.js";
    import {
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Already logged in → redirect
    onAuthStateChanged(auth, (user) => {
      if (user && user.email.endsWith("@" + ALLOWED_DOMAIN)) {
        window.location.replace("submit.html");
      }
    });

    document.getElementById("googleBtn").addEventListener("click", async () => {
      const errorMsg = document.getElementById("errorMsg");
      const loadingMsg = document.getElementById("loadingMsg");
      errorMsg.classList.add("hidden");
      loadingMsg.classList.remove("hidden");

      try {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ hd: ALLOWED_DOMAIN });
        const result = await signInWithPopup(auth, provider);
        const email = result.user.email;

        if (!email.endsWith("@" + ALLOWED_DOMAIN)) {
          await signOut(auth);
          errorMsg.textContent = `Only @${ALLOWED_DOMAIN} accounts are allowed.`;
          errorMsg.classList.remove("hidden");
          return;
        }

        window.location.replace("submit.html");
      } catch (err) {
        if (err.code !== "auth/popup-closed-by-user") {
          errorMsg.textContent = "Sign-in failed. Please try again.";
          errorMsg.classList.remove("hidden");
        }
      } finally {
        loadingMsg.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
