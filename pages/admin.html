<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50 text-gray-900">

  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4 flex items-center h-14">
      <span class="font-semibold text-lg mr-8">Feedback Dashboard</span>
      <a href="submit.html" class="mr-6 text-sm font-medium text-gray-500 hover:text-gray-800">Submit</a>
      <a href="admin.html" class="text-sm font-medium text-blue-600 border-b-2 border-blue-600 pb-0.5">Admin</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold mb-6">Admin Dashboard</h1>

    <!-- Filters -->
    <div class="bg-white border border-gray-200 rounded-lg px-4 py-4 mb-4 grid grid-cols-2 md:grid-cols-4 gap-3">
      <div>
        <label for="filterLocation" class="block text-xs font-medium text-gray-500 mb-1">Location</label>
        <select id="filterLocation" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All</option>
          <option value="District 1">District 1</option>
          <option value="District 3">District 3</option>
          <option value="Thao Dien">Thao Dien</option>
        </select>
      </div>
      <div>
        <label for="filterMinRating" class="block text-xs font-medium text-gray-500 mb-1">Min rating</label>
        <select id="filterMinRating" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Any</option>
          <option value="1">1 ★</option>
          <option value="2">2 ★</option>
          <option value="3">3 ★</option>
          <option value="4">4 ★</option>
          <option value="5">5 ★</option>
        </select>
      </div>
      <div>
        <label for="filterDateFrom" class="block text-xs font-medium text-gray-500 mb-1">Date from</label>
        <input id="filterDateFrom" type="date" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label for="filterDateTo" class="block text-xs font-medium text-gray-500 mb-1">Date to</label>
        <input id="filterDateTo" type="date" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>

    <!-- Count -->
    <p id="countLabel" class="text-sm text-gray-500 mb-3"></p>

    <div id="tableWrapper"></div>
  </main>

  <script src="../shared/app.js"></script>
  <script>
    const STORAGE_KEY = "feedbackEntries";

    function formatDate(iso) {
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const yyyy = d.getFullYear();
      const hh = String(d.getHours()).padStart(2, "0");
      const min = String(d.getMinutes()).padStart(2, "0");
      return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
    }

    function renderStars(rating) {
      return "★".repeat(rating) + "☆".repeat(5 - rating);
    }

    function escape(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function applyFilters(entries) {
      const location  = document.getElementById("filterLocation").value;
      const minRating = parseInt(document.getElementById("filterMinRating").value) || 0;
      const dateFrom  = document.getElementById("filterDateFrom").value;
      const dateTo    = document.getElementById("filterDateTo").value;

      return entries.filter(e => {
        if (location && e.location !== location) return false;
        if (minRating && e.rating < minRating) return false;
        if (dateFrom && e.submittedAt.slice(0, 10) < dateFrom) return false;
        if (dateTo   && e.submittedAt.slice(0, 10) > dateTo)   return false;
        return true;
      });
    }

    function render() {
      const all     = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      const entries = applyFilters(all);
      const wrapper = document.getElementById("tableWrapper");
      const countEl = document.getElementById("countLabel");

      if (all.length === 0) {
        countEl.textContent = "";
        wrapper.innerHTML = '<p class="text-gray-500 text-sm">No feedback yet</p>';
        return;
      }

      countEl.textContent = `Showing ${entries.length} of ${all.length} feedback${all.length !== 1 ? "s" : ""}`;

      if (entries.length === 0) {
        wrapper.innerHTML = '<p class="text-gray-500 text-sm">No feedback matches your filters</p>';
        return;
      }

      const sorted = entries.slice().sort((a, b) => b.id - a.id);

      const rows = sorted.map(e => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
          <td class="py-3 px-4 text-sm whitespace-nowrap">${formatDate(e.submittedAt)}</td>
          <td class="py-3 px-4 text-sm">${e.location ? escape(e.location) : '<span class="text-gray-400">—</span>'}</td>
          <td class="py-3 px-4 text-sm text-yellow-500 whitespace-nowrap">${renderStars(e.rating)}</td>
          <td class="py-3 px-4 text-sm">${e.name ? escape(e.name) : '<span class="text-gray-400">—</span>'}</td>
          <td class="py-3 px-4 text-sm">${escape(e.comment)}</td>
        </tr>
      `).join("");

      wrapper.innerHTML = `
        <div class="overflow-x-auto rounded-lg border border-gray-200 bg-white">
          <table class="w-full">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="py-3 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Date</th>
                <th class="py-3 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Location</th>
                <th class="py-3 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Rating</th>
                <th class="py-3 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Name</th>
                <th class="py-3 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Comment</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    render();

    ["filterLocation", "filterMinRating", "filterDateFrom", "filterDateTo"].forEach(id => {
      document.getElementById(id).addEventListener("change", render);
    });
  </script>
</body>
</html>
